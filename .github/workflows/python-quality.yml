name: Python quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: ruff format, ruff check, ty check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Sync
        run: uv sync --locked --dev

      - name: Ruff format
        run: uv run ruff format --check .

      - name: Ruff check
        run: uv run ruff check .

      - name: ty check
        run: uv run ty check
